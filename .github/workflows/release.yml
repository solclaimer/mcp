name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test --if-present

      - name: Bump version
        id: version
        run: |
          set -euo pipefail

          git fetch --tags --force

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger with version choice
            VERSION_TYPE="${{ github.event.inputs.version }}"
          else
            # Automatic: check commit message for version bump type
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if [[ "$COMMIT_MSG" =~ \[major\] ]]; then
              VERSION_TYPE="major"
            elif [[ "$COMMIT_MSG" =~ \[minor\] ]]; then
              VERSION_TYPE="minor"
            else
              VERSION_TYPE="patch"
            fi
          fi

          bump_version() {
            local version="$1"
            local bump_type="$2"
            IFS='.' read -r major minor patch <<< "$version"

            case "$bump_type" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported version type: $bump_type"
                exit 1
                ;;
            esac

            echo "${major}.${minor}.${patch}"
          }

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TARGET_VERSION=$(bump_version "$CURRENT_VERSION" "$VERSION_TYPE")

          while git rev-parse -q --verify "refs/tags/v${TARGET_VERSION}" >/dev/null; do
            echo "Tag v${TARGET_VERSION} already exists, bumping patch version..."
            TARGET_VERSION=$(bump_version "$TARGET_VERSION" "patch")
          done

          echo "Bumping $VERSION_TYPE version..."
          npm version "$TARGET_VERSION" --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${TARGET_VERSION} [skip ci]"
          git tag -a "v${TARGET_VERSION}" -m "chore: bump version to ${TARGET_VERSION} [skip ci]"

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Push changes
        run: |
          git push origin main
          git push origin v${{ steps.version.outputs.new_version }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          release_name: Release v${{ steps.version.outputs.new_version }}
          body: |
            ## Changes in v${{ steps.version.outputs.new_version }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Installation
            ```bash
            npm install @solclaimer/mcp@${{ steps.version.outputs.new_version }}
            ```
          draft: false
          prerelease: false

      - name: Verify npm publish access
        run: |
          npm whoami
          npm view @solclaimer/mcp version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify success
        run: |
          echo "✅ Successfully published v${{ steps.version.outputs.new_version }} to npm"
